<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction</title>
    <link rel="stylesheet" href="style.css">

    
</head>

<body>

<div class="container">

<h1>Diabetes Prediction</h1>

<form action="{{ url_for('predict') }}" method="POST">

<label>Pregnancies</label>
<input type="number" name="Pregnant" required>

<label>Glucose</label>
<input type="number" step="any" name="Glucose" required>

<label>Diastolic Blood Pressure</label>
<input type="number" step="any" name="Diastolic_BP" required>

<label>BMI</label>
<input type="number" step="any" name="BMI" required>

<label>Diabetes Pedigree Function</label>
<input type="number" step="any" name="Diabetes_Pedigree" required>

<label>Age</label>
<input type="number" step="any" name="Age" required>

<button type="submit">Predict</button>

</form>

</div>

</body>
</html>
