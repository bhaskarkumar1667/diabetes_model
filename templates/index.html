<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Patient Data</title>
   
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="hero" style="margin-bottom: 2rem;">
            <h2>Patient Data Input</h2>
        </div>

        <form action="{{ url_for('predict') }}" method="POST">
            <div class="form-grid">
                <div class="form-group">
                    <label for="Pregnant">Pregnancies</label>
                    <input type="number" id="Pregnant" name="Pregnant" step="1" required placeholder="e.g., 2">
                </div>

                <div class="form-group">
                    <label for="Glucose">Glucose Level</label>
                    <input type="number" id="Glucose" name="Glucose" step="any" required placeholder="e.g., 120">
                </div>

                <div class="form-group">
                    <label for="Diastolic_BP">Diastolic BP</label>
                    <input type="number" id="Diastolic_BP" name="Diastolic_BP" step="any" required placeholder="e.g., 70">
                </div>

                <div class="form-group">
                    <label for="BMI">BMI</label>
                    <input type="number" id="BMI" name="BMI" step="any" required placeholder="e.g., 28.5">
                </div>

                <div class="form-group">
                    <label for="Diabetes_Pedigree">Diabetes Pedigree</label>
                    <input type="number" id="Diabetes_Pedigree" name="Diabetes_Pedigree" step="any" required placeholder="e.g., 0.627">
                </div>

                <div class="form-group">
                    <label for="Age">Age</label>
                    <input type="number" id="Age" name="Age" step="1" required placeholder="e.g., 45">
                </div>
            </div>

            <button type="submit" class="btn">Run Prediction</button>
        </form>
        
        {% if prediction_text %}
            <div class="result" id="output-diagnostic-box">
                {{ prediction_text }}
            </div>

           
            <script>
                (function() {
                    const box = document.getElementById('output-diagnostic-box');
                    if (box) {
                        const content = box.textContent || box.innerText;
                        
                        if (content.includes("not diabetic")) {
                            box.classList.add('safe');
                        } else {
                            box.classList.add('alert');
                        }
                    }
                })();
            </script>
        {% endif %}

        <a href="{{ url_for('home') }}" class="back-link">← Back to Home</a>
    </div>
</body>
</html>
