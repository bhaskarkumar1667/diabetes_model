<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>

    <style>
        
        :root {
            --bg-color: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.8);
            --border-color: rgba(48, 54, 61, 0.8);
            --text-main: #c9d1d9;
            --accent-hover: #1f6feb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        
        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(31, 111, 235, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(56, 139, 253, 0.05) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            padding: 40px 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            border-color: rgba(88, 166, 255, 0.4);
            box-shadow: 0 10px 35px rgba(88, 166, 255, 0.1);
        }

        
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 25px;
            background: linear-gradient(45deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        
        h2 {
            font-size: 1.35rem;
            font-weight: 600;
            margin: 20px 0 35px 0;
            line-height: 1.5;
            padding: 18px;
            background: rgba(13, 17, 23, 0.6);
            border-radius: 8px;
            border: 1px dashed var(--border-color);
            transition: all 0.3s ease;
        }

        
        .status-safe {
            color: #238636; 
            text-shadow: 0 0 15px rgba(35, 134, 54, 0.3);
            border-color: rgba(35, 134, 54, 0.4);
        }

        .status-alert {
            color: #f85149; 
            text-shadow: 0 0 15px rgba(248, 81, 73, 0.3);
            border-color: rgba(248, 81, 73, 0.4);
        }

       
        a {
            display: block;
            text-align: center;
            text-decoration: none;
            background-color: var(--accent-hover);
            background-image: linear-gradient(180deg, rgba(255,255,255,0.15), rgba(255,255,255,0));
            border: 1px solid rgba(240,246,252,0.1);
            border-radius: 8px;
            color: #ffffff;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: background-color 0.2s, transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(31, 111, 235, 0.3);
        }

        a:hover {
            background-color: #1f6feb;
            box-shadow: 0 4px 20px rgba(56, 139, 253, 0.4);
        }

        a:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Prediction Result</h1>
    
   
    <h2 id="result-box">{{ prediction_text }}</h2>
    
    <a href="{{ url_for('home') }}">Predict Again</a>
</div>


<script>
    const resultBox = document.getElementById('result-box');
    const textValue = resultBox.textContent || resultBox.innerText;

    
    if (textValue.includes("not diabetic")) {
        resultBox.classList.add('status-safe');
    } else {
        resultBox.classList.add('status-alert');
    }
</script>

</body>
</html>
